---
name: Linux and macOS wheels

on: [push, pull_request, workflow_dispatch]

env:
  REPO_DIR: rasterio
  WHEEL_SDIR: wheelhouse

jobs:
  build:
    name: ${{ matrix.python }} ${{ matrix.os-name }} ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ "ubuntu-20.04", "ubuntu-22.04-arm", "macos-12" ]
        python: [ "3.9", "3.10", "3.11", "3.12" ]
        platform: [ "x86_64", "aarch64" ]
        macos-target: [ "10.15" ]
        exclude:
          - os: "macos-12"
            platform: "i686"
          - os: "macos-12"
            platform: "aarch64"
          - os: "ubuntu-20.04-arm"
            platform: "x86_64"
          - os: "ubuntu-20.04"
            platform: "aarch64"
        include:
          - os: "macos-12"
            os-name: "osx"
          - os: "ubuntu-20.04"
            os-name: "focal"
          - os: "ubuntu-20.04-arm"
            os-name: "focal"
    env:
      BUILD_COMMIT: 1.4b1
      PLAT: "${{ matrix.platform }}"
      MB_PYTHON_VERSION: "${{ matrix.python }}"
      MB_ML_VER: "2014"
      TEST_DEPENDS: "oldest-supported-numpy attrs==24.2.0 pytest==8.3.2 click==8.0.3 mock boto3 packaging hypothesis==6.110.1 fsspec aiohttp requests"
      TRAVIS_OS_NAME: ${{ matrix.os-name }}
      MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos-target }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-python@v4
        with:
          python-version: "3.x"
      - name: Build Wheel
        run: |

          if [[ "$TRAVIS_OS_NAME" == "osx" ]]; then
            # webp, zstd, xz, libtiff cause a conflict with building webp and libtiff
            # curl from brew requires zstd, use system curl
            # if php is installed, brew tries to reinstall these after installing openblas
            brew remove -f --ignore-dependencies liblerc webp zstd libtiff libxcb libxdcmp curl php lcms2 xmlto ghostscript lz4 openjpeg xz giflib rtmpdump brotli snappy
            brew install pkg-config
            brew deps --tree --installed
          fi

          if [[ "$MB_PYTHON_VERSION" == pypy3* ]]; then
            MB_PYTHON_OSX_VER="10.9"
            if [[ "$PLAT" == "i686" ]]; then
              DOCKER_TEST_IMAGE="multibuild/xenial_$PLAT"
            else
              DOCKER_TEST_IMAGE="multibuild/focal_$PLAT"
            fi
          fi

          echo "::group::Install a virtualenv"
            source multibuild/common_utils.sh
            source multibuild/travis_steps.sh
            python3 -m pip install virtualenv
            before_install
          echo "::endgroup::"

          echo "::group::Build wheel"
            clean_code $REPO_DIR $BUILD_COMMIT
            build_wheel $REPO_DIR $PLAT
            ls -l "${GITHUB_WORKSPACE}/${WHEEL_SDIR}/"
          echo "::endgroup::"

          if [[ $MACOSX_DEPLOYMENT_TARGET != "11.0" ]]; then
            echo "::group::Test wheel"
              install_run $PLAT
            echo "::endgroup::"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: wheelhouse/*.whl

  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: "startsWith(github.ref, 'refs/tags/')"
    needs: build
    steps:
      - uses: actions/download-artifact@v2
        with:
          name: wheels
      - name: Upload Release
        uses: fnkr/github-action-ghr@v1.3
        env:
          GHR_PATH: .
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  success:
    needs: [build]
    runs-on: ubuntu-latest
    name: Wheels Successful
    steps:
      - name: Success
        run: echo Wheels Successful
